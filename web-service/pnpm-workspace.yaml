packages:
  - .

# NOTE: this file must be copied into the Docker deps stage (see Dockerfile),
# otherwise pnpm install --frozen-lockfile fails on unapproved build scripts.

# Only these dependencies may run install/build scripts — an explicit
# allowlist instead of dangerouslyAllowAllBuilds, so a compromised transitive
# dependency can't run arbitrary code at install time.
# (pnpm 11 replaced onlyBuiltDependencies with the allowBuilds map.)
allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  unrs-resolver: true

# Match the deploy host's supply-chain policy: only resolve package versions
# published at least 24h ago. This makes local resolution automatically pick
# policy-safe versions, no manual pins needed.
minimumReleaseAge: 1440
