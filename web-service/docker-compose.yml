services:
  web:
    build:
      # The Dockerfile COPYs paths prefixed with web-service/, so the build
      # context must be the repo root (same as captain-definition).
      context: ..
      dockerfile: web-service/Dockerfile
      args:
        - TIMEZONE=${TIMEZONE:-Pacific/Auckland}
    container_name: flat-manager
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - SQLITE_DB_PATH=/app/data/sqlite.db
